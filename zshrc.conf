# --- History
HISTSIZE=100000
SAVEHIST=100000
setopt EXTENDED_HISTORY
setopt HIST_IGNORE_ALL_DUPS
setopt INC_APPEND_HISTORY
setopt SHARE_HISTORY

# --- Locale & editor
export LANG=en_US.UTF-8
export EDITOR='nvim'

# --- Completion (picks up ~/.my-dot-files/completions/_kks etc.)
fpath=($HOME/.my-dot-files/completions $fpath)
autoload -U compinit && compinit
