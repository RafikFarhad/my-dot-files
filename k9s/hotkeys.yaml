# $XDG_CONFIG_HOME/k9s/hotkey.yml
hotKeys:
  shift-0:
    shortCut:    Shift-0
    description: Viewing pods
    command:     pods
  shift-1:
    shortCut:    Shift-1
    description: View deployments
    command:     dp
  shift-2:
    shortCut:    Shift-2
    description: Xray Deployments
    command:     xray deploy
  shift-3:
    shortCut:    Shift-3
    description: View sandboxes templates
    command:     sbt
  shift-4:
    shortCut:    Shift-4
    description: View sandboxes claims
    command:     sbc
  shift-5:
    shortCut:    Shift-5
    description: View sandboxes
    command:     sb