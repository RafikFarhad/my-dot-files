# Heavy / one-time setup goes here so it's not paid per terminal tab.
# Interactive bits (history, completion) live in zshrc.conf.

# --- Homebrew (must run first; sets PATH for brew-installed tools below)
eval "$(/opt/homebrew/bin/brew shellenv)"

# --- NVM
export NVM_DIR="$HOME/.nvm"
[ -s "/opt/homebrew/opt/nvm/nvm.sh" ] && \. "/opt/homebrew/opt/nvm/nvm.sh"
[ -s "/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm" ] && \. "/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm"

# --- Bitwarden SSH agent
export SSH_AUTH_SOCK=/Users/farhad/Library/Containers/com.bitwarden.desktop/Data/.bitwarden-ssh-agent.sock

# --- Aliases & utility functions
source ~/.my-dot-files/my_aliases
[[ -f ~/.my-dot-files/local/local_aliases ]] && source ~/.my-dot-files/local/local_aliases

# --- pyenv
export PYENV_ROOT="$HOME/.pyenv"
[[ -d $PYENV_ROOT/bin ]] && export PATH="$PYENV_ROOT/bin:$PATH"
eval "$(pyenv init - zsh)"

# --- gcloud
export PATH="$PATH:/opt/homebrew/Caskroom/gcloud-cli/latest/google-cloud-sdk/bin"

# --- rbenv
eval "$(rbenv init - --no-rehash zsh)"
export PREPUSH_SORBET_CHECK=0 SKIP_PREPUSH_RUBOCOP_CHECK=1 DISABLE_GC_STATS_EVENT=true

# --- goenv
eval "$(goenv init -)"

# --- MCP
export MAX_MCP_OUTPUT_TOKENS=10000

# --- uv / rust / go bin paths
export PATH=$PATH:$HOME/.local/bin
export PATH=$PATH:$HOME/.cargo/bin
export PATH=$PATH:$GOPATH/bin

# --- this dotfiles dir on PATH (so `kks` and any sibling scripts resolve)
export PATH=$PATH:$HOME/.my-dot-files

# --- Brew gnubin shims, then de-dupe PATH
# https://gist.github.com/skyzyx/3438280b18e4f7c490db8a2a2ca0b9da
if type brew &>/dev/null; then
  HOMEBREW_PREFIX=$(brew --prefix)
  NEWPATH=${PATH}
  for d in ${HOMEBREW_PREFIX}/opt/*/libexec/gnubin; do NEWPATH=$d:$NEWPATH; done
  export PATH=$(echo ${NEWPATH} | tr ':' '\n' | cat -n | sort -uk2 | sort -n | cut -f2- | xargs | tr ' ' ':')
fi

# --- Misc
export RTK_TELEMETRY_DISABLED=1
export NODE_PATH=$(npm root -g)

# --- Secrets / machine-local env.
[[ -f ~/.my-dot-files/local/local_env ]] && source ~/.my-dot-files/local/local_env
